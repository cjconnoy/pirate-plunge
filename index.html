<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Pirate Plunge — vibe prototype</title>
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0806; overflow:hidden; touch-action:none;
               -webkit-user-select:none; user-select:none; }
  canvas { display:block; margin:0 auto; height:100%; touch-action:none; -webkit-tap-highlight-color:transparent; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
// ============================================================
// PIRATE PLUNGE v4 — competitive 30s cave water-slide race
// ONE fork at the drop-in: pick your chute as the race starts.
// After that: no lanes, no walls — open water, continuous
// steering. Thumb-tap left/right strafes a fixed step; taps
// stack. iOS: raw touchstart (no double-tap-zoom delay).
// You vs 2 CPU riders; hazards & boosted rams = 2s blink-out.
// Fixed seeded layout, RNG starting chutes. One file, no assets.
// ============================================================

const cv = document.getElementById('c');
const ctx = cv.getContext('2d');

const W = 420;
let H = 740;
function fit() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const aw = window.innerWidth, ah = window.innerHeight;
  H = Math.max(620, Math.min(980, Math.round(W * ah / aw)));
  cv.width = W * dpr; cv.height = H * dpr;
  cv.style.width = aw + 'px'; cv.style.height = ah + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', fit);
fit();

// ---------- tuning ----------
const SLIDE_W   = 336;
const LANE_W    = SLIDE_W / 3;          // used by the start fork + spawn columns
const SLIDE_X   = (W - SLIDE_W) / 2;
const PLAYER_Y  = () => H * 0.30;
const BASE_SPD  = 520;
const MAX_SPD   = 800;
const TRACK_LEN = 18500;
const STUN_DUR  = 2.0;
const STUN_MUL  = 0.35;
const GRACE     = 0.5;
const BOOST_DUR = 1.8;
const BOOST_MUL = 1.5;
const DASH      = 96;                   // px strafed per thumb tap
const EDGE_PAD  = 26;
const LOCK_PRE  = 90;

const laneX = l => SLIDE_X + LANE_W * (l + 0.5);

// ---------- audio (all synth) ----------
let AC = null, whooshGain = null;
function audioInit() {
  if (AC) return;
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    const len = AC.sampleRate * 1.5, buf = AC.createBuffer(1, len, AC.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
    const f = AC.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 700; f.Q.value = 0.6;
    whooshGain = AC.createGain(); whooshGain.gain.value = 0;
    src.connect(f); f.connect(whooshGain); whooshGain.connect(AC.destination);
    src.start();
  } catch (e) { AC = null; }
}
function beep(freq, dur, type = 'square', vol = 0.14, slideTo = 0) {
  if (!AC) return;
  const o = AC.createOscillator(), g = AC.createGain(), t = AC.currentTime;
  o.type = type; o.frequency.setValueAtTime(freq, t);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(AC.destination); o.start(t); o.stop(t + dur + 0.02);
}
function noiseBurst(dur, vol = 0.3, freq = 900) {
  if (!AC) return;
  const len = AC.sampleRate * dur, buf = AC.createBuffer(1, len, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const s = AC.createBufferSource(); s.buffer = buf;
  const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = freq;
  const g = AC.createGain(); g.gain.value = vol;
  s.connect(f); f.connect(g); g.connect(AC.destination); s.start();
}
const sfx = {
  coin:   () => beep(880, 0.09, 'square', 0.10, 1320),
  gem:    () => { beep(660, 0.10, 'square', 0.10); setTimeout(() => beep(880, 0.10, 'square', 0.10), 70); setTimeout(() => beep(1320, 0.16, 'square', 0.10), 140); },
  shield: () => beep(520, 0.25, 'triangle', 0.16, 780),
  boost:  () => beep(220, 0.45, 'sawtooth', 0.14, 880),
  stun:   () => { beep(140, 0.25, 'sawtooth', 0.22, 60); noiseBurst(0.18, 0.25, 600); },
  ko:     () => { beep(180, 0.12, 'square', 0.18, 90); setTimeout(() => beep(520, 0.18, 'square', 0.14, 1040), 90); },
  splash: () => { noiseBurst(0.8, 0.4, 700); beep(300, 0.5, 'sine', 0.12, 80); },
  dash:   () => noiseBurst(0.06, 0.08, 1400),
  clank:  () => { beep(90, 0.08, 'square', 0.16, 60); noiseBurst(0.06, 0.14, 400); },
  count:  () => beep(440, 0.12, 'square', 0.14),
  go:     () => beep(660, 0.35, 'square', 0.16, 990),
  fanfare:() => { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.22, 'square', 0.12), i * 130)); },
};

// ---------- fixed layout (seeded — same every run) ----------
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function shuffle3(R) {
  const a = [0, 1, 2];
  for (let i = 2; i > 0; i--) { const j = (R() * (i + 1)) | 0; [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

// THE start fork — the only walled stretch in the game
const FORK = { start: 320, end: 1350, roles: null };

function buildTrack() {
  const R = mulberry32(4242);
  const objs = [];
  const roles = shuffle3(R);
  FORK.roles = { clean: roles[0], loot: roles[1], trap: roles[2] };

  // start-fork channel contents (no x jitter — channels are narrow)
  const L = FORK.end - FORK.start, fr = FORK.roles;
  objs.push({ d: FORK.start + L * 0.55, lane: fr.clean, x: laneX(fr.clean), type: 'coin', alive: true });
  for (let k = 0; k < 3; k++) objs.push({ d: FORK.start + L * (0.3 + k * 0.18), lane: fr.loot, x: laneX(fr.loot), type: 'coin', alive: true });
  objs.push({ d: FORK.start + L * 0.85, lane: fr.loot, x: laneX(fr.loot), type: 'gem', alive: true });
  objs.push({ d: FORK.start + L * 0.45, lane: fr.trap, x: laneX(fr.trap), type: ['rock', 'spikes', 'hole'][(R() * 3) | 0], hazard: true, alive: true });
  objs.push({ d: FORK.start + L * 0.72, lane: fr.trap, x: laneX(fr.trap), type: 'boost', alive: true });
  objs.push({ d: FORK.start + L * 0.92, lane: fr.trap, x: laneX(fr.trap), type: 'gem', alive: true });

  // open water: everything after the fork, spawn columns + organic jitter
  let d = FORK.end + 350, special = 0;
  while (d < TRACK_LEN - 900) {
    const t = d / TRACK_LEN;
    const nHaz = R() < 0.15 + t * 0.5 ? 2 : 1;
    const lanes = shuffle3(R);
    for (let i = 0; i < nHaz; i++)
      objs.push({ d, lane: lanes[i], x: laneX(lanes[i]) + (R() * 2 - 1) * 18,
                  type: ['rock', 'spikes', 'hole'][(R() * 3) | 0], hazard: true, alive: true });
    const safe = lanes[nHaz];
    if (R() < 0.6) {
      const cx = laneX(safe) + (R() * 2 - 1) * 14;
      for (let k = 0; k < 3; k++) objs.push({ d: d + 70 + k * 55, lane: safe, x: cx, type: 'coin', alive: true });
    }
    special += 330;
    if (special > 1700) {
      special = 0;
      const sl = (R() * 3) | 0;
      objs.push({ d: d + 160, lane: sl, x: laneX(sl) + (R() * 2 - 1) * 16,
                  type: ['gem', 'shield', 'boost', 'gem'][(R() * 4) | 0], alive: true });
    }
    d += 330 + R() * 130 - t * 50;
  }
  return objs;
}

const inFork = r => r.dist > FORK.start - LOCK_PRE && r.dist < FORK.end - 50;
const chanOf = x => Math.max(0, Math.min(2, Math.floor((x - SLIDE_X) / LANE_W)));
const virtLane = r => chanOf(r.tx);

// ---------- riders ----------
const RIDER_DEFS = [
  { name: 'YOU',     shirt: '#2fa7a0', bandana: '#d23b2e', cpu: false },
  { name: 'ONE-EYE', shirt: '#c96a1e', bandana: '#2e7d32', cpu: true },
  { name: 'SQUID',   shirt: '#7b4fd0', bandana: '#ffd23f', cpu: true },
];

let state = 'title';      // title | count | run | splash | over
let riders, objects, particles, elapsed, countT, splashT, overT, finishOrder;
let best = +(localStorage.getItem('pp_best') || 0);

function reset() {
  objects = buildTrack();
  particles = [];
  elapsed = 0; countT = 0; splashT = 0; overT = 0;
  finishOrder = [];
  const lanes = [0, 1, 2].sort(() => Math.random() - 0.5);   // RNG starting chutes
  riders = RIDER_DEFS.map((def, i) => ({
    ...def,
    tx: laneX(lanes[i]), px: laneX(lanes[i]),
    dist: 0, speed: 0, aiT: 0, pickedFork: false,
    stunT: 0, graceT: 0, boostT: 0, bounceT: 0, shield: false,
    nudgeT: 0, nudgeDir: 0,
    coins: 0, score: 0, kos: 0,
    finished: false, place: 0,
    pace: def.cpu ? 0.99 + Math.random() * 0.02 : 1.0,
  }));
}
const player = () => riders[0];

// ---------- steering: continuous strafe, taps stack ----------
function bounds(r) {
  if (inFork(r)) {                       // walls: stay inside your chute
    const c = chanOf(r.px);
    return [SLIDE_X + c * LANE_W + EDGE_PAD, SLIDE_X + (c + 1) * LANE_W - EDGE_PAD];
  }
  return [SLIDE_X + EDGE_PAD, SLIDE_X + SLIDE_W - EDGE_PAD];
}
function steer(r, dir) {                 // dir = -1 | +1
  if (!dir) return;
  const step = r.cpu ? LANE_W : DASH;
  const [lo, hi] = bounds(r);
  const nt = Math.max(lo, Math.min(hi, r.tx + dir * step));
  if (Math.abs(nt - r.tx) < 2) {         // wall or edge — physical feedback
    if (!r.cpu) { r.nudgeT = 0.18; r.nudgeDir = dir; sfx.clank(); }
    return;
  }
  r.tx = nt;
  if (!r.cpu) sfx.dash();
}
function press(clientX) {
  audioInit();
  if (AC && AC.state === 'suspended') AC.resume();
  if (state === 'title') { reset(); state = 'count'; return; }
  if (state === 'over' && overT > 0.6) { reset(); state = 'count'; return; }
  if (state === 'run' || state === 'count') {   // steer during countdown too — pick your chute
    const rect = cv.getBoundingClientRect();
    const x = (clientX - rect.left) / rect.width * W;
    steer(player(), x < W / 2 ? -1 : 1);
  }
}
// iOS: raw touchstart = zero tap delay, both thumbs via changedTouches.
// pointerdown covers mouse/pen only (touch pointers are skipped to avoid double-fire).
cv.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) press(t.clientX);
}, { passive: false });
cv.addEventListener('pointerdown', e => {
  if (e.pointerType === 'touch') return;
  e.preventDefault(); press(e.clientX);
});
window.addEventListener('keydown', e => {
  if (state !== 'run' && state !== 'count') { if (e.key === ' ' || e.key === 'Enter') press(W / 2); return; }
  audioInit();
  if (e.key === 'ArrowLeft')  steer(player(), -1);
  if (e.key === 'ArrowRight') steer(player(), 1);
});

// ---------- particles ----------
function spray(x, y, n, col, spread = 3, up = -2) {
  for (let i = 0; i < n; i++) {
    particles.push({ x, y, vx: (Math.random() - 0.5) * spread * 60,
                     vy: (up + Math.random() * 2) * 60, life: 0.4 + Math.random() * 0.4, col });
  }
}

// ---------- helpers ----------
function hazardsIn(lane, from, to) {
  let n = 0;
  for (const o of objects) if (o.hazard && o.lane === lane && o.d > from && o.d < to) n++;
  return n;
}
function lootIn(lane, from, to) {
  let v = 0;
  for (const o of objects) {
    if (o.hazard || !o.alive || o.lane !== lane || o.d < from || o.d > to) continue;
    v += o.type === 'coin' ? 1 : o.type === 'gem' ? 4 : 3;
  }
  return v;
}
const riderY = r => PLAYER_Y() + (r.dist - player().dist);
function stunRider(r, col) {
  if (r.boostT > 0 || r.stunT > 0 || r.graceT > 0) return false;
  if (r.shield) { r.shield = false; r.graceT = 0.6; if (!r.cpu) sfx.shield(); spray(r.px, riderY(r), 12, '#7fe9ff', 5, -3); return false; }
  r.stunT = STUN_DUR;
  spray(r.px, riderY(r), 16, col, 6, -3);
  return true;
}
const rank = r => 1 + riders.filter(o => o !== r && o.dist > r.dist).length;

// ---------- CPU brain (virtual 3-column thinking on a continuous slide) ----------
function cpuDecide3(r, scoreFn) {
  const c = virtLane(r);
  let bestLane = c, bestScore = -1e9;
  for (let lane = 0; lane < 3; lane++) {
    const s = scoreFn(lane) - 8 * Math.abs(lane - c) + Math.random() * 18;
    if (s > bestScore) { bestScore = s; bestLane = lane; }
  }
  if (bestLane !== c) steer(r, Math.sign(bestLane - c));
}
function cpuThink(r, dt) {
  r.aiT -= dt;
  if (r.aiT > 0 || r.stunT > 0) return;
  r.aiT = 0.22;
  // pick a start chute before the fork walls close
  if (!r.pickedFork && r.dist < FORK.start - LOCK_PRE + 10) {
    r.pickedFork = true;
    cpuDecide3(r, lane => -110 * hazardsIn(lane, FORK.start, FORK.end) + 14 * lootIn(lane, FORK.start, FORK.end));
    return;
  }
  if (inFork(r)) return;
  const c = virtLane(r);
  // dodge hazards ahead in my column
  if (hazardsIn(c, r.dist + 30, r.dist + 340) > 0) {
    cpuDecide3(r, lane => lane === c ? -1e5 :
      -110 * hazardsIn(lane, r.dist + 30, r.dist + 420) + 10 * lootIn(lane, r.dist, r.dist + 420));
    return;
  }
  // boosted? hunt a rival
  if (r.boostT > 0.4) {
    for (const o of riders) {
      if (o === r || o.stunT > 0) continue;
      if (o.dist > r.dist && o.dist - r.dist < 420 && Math.abs(o.px - r.px) > 30 && Math.abs(o.px - r.px) < 160)
        { steer(r, Math.sign(o.px - r.px)); return; }
    }
  }
  // greed: hop to a clearly richer adjacent column
  for (const lane of [c - 1, c + 1]) {
    if (lane < 0 || lane > 2) continue;
    if (hazardsIn(lane, r.dist + 30, r.dist + 380) === 0 &&
        lootIn(lane, r.dist, r.dist + 380) >= lootIn(c, r.dist, r.dist + 380) + 3 &&
        Math.random() < 0.6) { steer(r, Math.sign(lane - c)); return; }
  }
}

// ---------- update ----------
function update(dt) {
  if (state === 'count') {
    const prev = countT; countT += dt;
    for (const n of [0.001, 0.5, 1.0]) if (prev < n && countT >= n) sfx.count();
    if (prev < 1.5 && countT >= 1.5) sfx.go();
    // riders can pre-position during the countdown
    for (const r of riders) {
      if (r.cpu && !r.pickedFork) {
        r.pickedFork = true;
        cpuDecide3(r, lane => -110 * hazardsIn(lane, FORK.start, FORK.end) + 14 * lootIn(lane, FORK.start, FORK.end));
      }
      if (r.nudgeT > 0) r.nudgeT -= dt;
      r.px += (r.tx - r.px) * Math.min(1, dt * 24);
    }
    if (countT >= 1.5) state = 'run';
  }
  else if (state === 'run' || state === 'splash') {
    if (state === 'run') elapsed += dt;

    for (const r of riders) {
      if (r.finished) continue;
      const ramp = BASE_SPD + (MAX_SPD - BASE_SPD) * Math.min(1, r.dist / TRACK_LEN);
      let mul = r.pace;
      if (r.boostT > 0)  { r.boostT -= dt; mul *= BOOST_MUL; }
      if (r.stunT > 0)   { r.stunT -= dt; mul *= STUN_MUL; if (r.stunT <= 0) r.graceT = GRACE; }
      else if (r.graceT > 0) r.graceT -= dt;
      if (r.bounceT > 0) { r.bounceT -= dt; mul *= 0.82; }
      if (r.nudgeT > 0)  r.nudgeT -= dt;
      const rk = rank(r);
      mul *= rk === 1 ? 0.97 : rk === 3 ? 1.06 : 1.0;
      r.speed = ramp * mul;
      r.dist += r.speed * dt;

      if (r.cpu) cpuThink(r, dt);
      // clamp target into current bounds (walls may have appeared/gone)
      const [lo, hi] = bounds(r);
      r.tx = Math.max(lo, Math.min(hi, r.tx));
      r.px += (r.tx - r.px) * Math.min(1, dt * 24);

      const ry = riderY(r);
      if (ry > -40 && ry < H + 40 && Math.random() < 0.5)
        spray(r.px + (Math.random() - 0.5) * 24, ry + 18, 1, 'rgba(210,240,255,0.8)', 2, -1.2);

      for (const o of objects) {
        if (Math.abs(o.d - r.dist) > 60) continue;
        if (Math.abs(o.x - r.px) > (o.hazard ? 38 : 58)) continue;
        if (o.hazard) {
          if (Math.abs(o.d - r.dist) < 36 && r.stunT <= 0 && stunRider(r, '#ff5a4e')) { if (!r.cpu) sfx.stun(); }
        } else if (o.alive && Math.abs(o.d - r.dist) < 48) {
          o.alive = false;
          const dbl = r.boostT > 0 ? 2 : 1;
          if (o.type === 'coin')   { r.coins++; r.score += 10 * dbl; if (!r.cpu) { sfx.coin(); spray(r.px, ry - 10, 6, '#ffd23f', 3, -2.5); } }
          if (o.type === 'gem')    { r.score += 50 * dbl; if (!r.cpu) sfx.gem(); spray(r.px, ry - 10, 10, '#ff5ad0', 4, -3); }
          if (o.type === 'shield') { r.shield = true; if (!r.cpu) sfx.shield(); }
          if (o.type === 'boost')  { r.boostT = BOOST_DUR; if (!r.cpu) sfx.boost(); }
        }
      }

      if (r.dist >= TRACK_LEN && !r.finished) {
        r.finished = true;
        finishOrder.push(r); r.place = finishOrder.length;
        r.score += [100, 50, 25][r.place - 1] || 0;
        if (!r.cpu) { state = 'splash'; splashT = 0; sfx.splash(); }
      }
    }

    // rider vs rider contact (continuous x now)
    for (let i = 0; i < riders.length; i++) for (let j = i + 1; j < riders.length; j++) {
      const a = riders[i], b = riders[j];
      if (a.finished || b.finished) continue;
      if (a.stunT > 0 || b.stunT > 0) continue;
      if (Math.abs(a.px - b.px) > 34) continue;
      const gap = Math.abs(a.dist - b.dist);
      if (gap > 42) continue;
      const aB = a.boostT > 0, bB = b.boostT > 0;
      if (aB !== bB) {
        const hit = aB ? b : a, by = aB ? a : b;
        if (stunRider(hit, '#ffd23f')) {
          by.score += 25; by.kos++;
          sfx.ko();
          if (!hit.cpu) sfx.stun();
        }
      } else {
        const rear = a.dist < b.dist ? a : b;
        rear.bounceT = 0.4;
        rear.dist -= (42 - gap) * 0.5;
        if (!rear.cpu) noiseBurst(0.08, 0.12, 500);
      }
    }

    if (state === 'splash') {
      splashT += dt;
      if (splashT < 0.05) for (let i = 0; i < 40; i++) spray(W / 2, H * 0.62, 1, 'rgba(190,230,255,0.9)', 9, -5);
      if (splashT > 1.4) {
        for (const r of [...riders].sort((x, y) => y.dist - x.dist)) {
          if (!r.finished) { r.finished = true; finishOrder.push(r); r.place = finishOrder.length; r.score += [100, 50, 25][r.place - 1] || 0; }
        }
        const p = player();
        if (p.score > best) { best = p.score; localStorage.setItem('pp_best', best); }
        state = 'over'; overT = 0;
        if (p.place === 1) sfx.fanfare();
      }
    }
  }
  else if (state === 'over') overT += dt;

  for (const p of particles) { p.life -= dt; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 300 * dt; }
  particles = particles.filter(p => p.life > 0);
  if (whooshGain) whooshGain.gain.value = state === 'run' ? 0.05 + 0.10 * (player().speed / MAX_SPD) : 0.015;
}

// ---------- drawing ----------
function cave(scroll) {
  ctx.fillStyle = '#161009';
  ctx.fillRect(0, 0, W, H);
  const off = (scroll * 0.9) % 90;
  ctx.fillStyle = '#241709';
  for (const side of [0, 1]) {
    ctx.beginPath();
    ctx.moveTo(side ? W : 0, 0);
    for (let y = -90; y <= H + 90; y += 45) {
      const j = 18 + 14 * Math.sin((y + off) * 0.09 + side * 5) + 8 * Math.sin((y + off) * 0.23);
      ctx.lineTo(side ? W - SLIDE_X + 14 - j : SLIDE_X - 14 + j, y - off + 45);
    }
    ctx.lineTo(side ? W : 0, H);
    ctx.closePath(); ctx.fill();
  }
  const toff = scroll % 620;
  for (let y = -toff; y < H + 80; y += 620) {
    for (const tx of [SLIDE_X - 26, W - SLIDE_X + 26]) {
      const fl = 3 + Math.sin(performance.now() * 0.02 + tx) * 2;
      ctx.fillStyle = '#5a3a16'; ctx.fillRect(tx - 3, y + 8, 6, 18);
      ctx.fillStyle = '#ff9a2a';
      ctx.beginPath(); ctx.ellipse(tx, y + 2, 6, 9 + fl, 0, 0, 7); ctx.fill();
      ctx.fillStyle = '#ffe08a';
      ctx.beginPath(); ctx.ellipse(tx, y + 4, 3, 5, 0, 0, 7); ctx.fill();
      const g = ctx.createRadialGradient(tx, y, 4, tx, y, 70);
      g.addColorStop(0, 'rgba(255,160,60,0.16)'); g.addColorStop(1, 'rgba(255,160,60,0)');
      ctx.fillStyle = g; ctx.fillRect(tx - 70, y - 70, 140, 140);
    }
  }
}

function slide(scroll) {
  ctx.fillStyle = '#4a3418';
  ctx.fillRect(SLIDE_X - 14, 0, SLIDE_W + 28, H);
  const g = ctx.createLinearGradient(SLIDE_X, 0, SLIDE_X + SLIDE_W, 0);
  g.addColorStop(0, '#0e5d70'); g.addColorStop(0.5, '#1487a0'); g.addColorStop(1, '#0e5d70');
  ctx.fillStyle = g;
  ctx.fillRect(SLIDE_X, 0, SLIDE_W, H);
  ctx.strokeStyle = 'rgba(255,255,255,0.22)';
  const soff = scroll % 140;
  for (let y = -soff; y < H; y += 140) {
    for (let i = 0; i < 5; i++) {
      const x = SLIDE_X + 20 + ((i * 73 + y * 1.7) % (SLIDE_W - 40));
      ctx.beginPath(); ctx.moveTo(x, y + i * 22); ctx.lineTo(x - 3, y + i * 22 + 26 + (riders ? player().speed : 0) * 0.02); ctx.stroke();
    }
  }
  // THE start fork (only walls in the game)
  const py = PLAYER_Y();
  const yTop = py + (FORK.start - scroll);
  const yBot = py + (FORK.end - scroll);
  if (yBot > -40 && yTop < H + 40) {
    ctx.fillStyle = '#3d2a11';
    for (const bx of [SLIDE_X + LANE_W, SLIDE_X + 2 * LANE_W]) {
      const a = Math.max(-20, yTop), b = Math.min(H + 20, yBot);
      if (b > a) ctx.fillRect(bx - 5, a, 10, b - a);
      if (yTop > -40 && yTop < H + 40) {
        ctx.beginPath(); ctx.moveTo(bx - 5, yTop); ctx.lineTo(bx, yTop - 46); ctx.lineTo(bx + 5, yTop); ctx.closePath(); ctx.fill();
      }
    }
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    if (yTop > -30 && yTop < H + 30) ctx.fillRect(SLIDE_X, yTop - 2, SLIDE_W, 4);
    if (yBot > -30 && yBot < H + 30) ctx.fillRect(SLIDE_X, yBot - 2, SLIDE_W, 4);
    const ly = yTop - 64;
    if (ly > -20 && ly < H + 20) {
      ctx.fillStyle = '#ffd23f';
      ctx.font = 'bold 15px system-ui, sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('⚠ PICK YOUR CHUTE ⚠', W / 2, ly);
    }
  }
  ctx.fillStyle = 'rgba(255,255,255,0.30)';
  const foff = scroll % 26;
  for (let y = -foff; y < H; y += 26) {
    ctx.fillRect(SLIDE_X, y, 5, 12);
    ctx.fillRect(SLIDE_X + SLIDE_W - 5, y + 8, 5, 12);
  }
}

function drawObject(o, oy) {
  const x = o.x;
  ctx.save(); ctx.translate(x, oy);
  if (o.type === 'rock') {
    ctx.fillStyle = '#6b6b66';
    ctx.beginPath();
    ctx.moveTo(-28, 14); ctx.lineTo(-20, -14); ctx.lineTo(-4, -24); ctx.lineTo(16, -16);
    ctx.lineTo(28, 6); ctx.lineTo(14, 18); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#84847e';
    ctx.beginPath(); ctx.moveTo(-12, -14); ctx.lineTo(-4, -22); ctx.lineTo(10, -14); ctx.lineTo(-2, -6); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillRect(-32, 12, 10, 5); ctx.fillRect(22, 8, 10, 5);
  } else if (o.type === 'spikes') {
    for (let i = -1; i <= 1; i++) {
      ctx.fillStyle = '#7a4a1c';
      ctx.beginPath(); ctx.moveTo(i * 24 - 8, 16); ctx.lineTo(i * 24, -22); ctx.lineTo(i * 24 + 8, 16); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#e8d9b0';
      ctx.beginPath(); ctx.moveTo(i * 24 - 3, -12); ctx.lineTo(i * 24, -22); ctx.lineTo(i * 24 + 3, -12); ctx.closePath(); ctx.fill();
    }
  } else if (o.type === 'hole') {
    ctx.fillStyle = 'rgba(4,10,14,0.92)';
    ctx.beginPath(); ctx.ellipse(0, 0, 36, 20, 0, 0, 7); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.ellipse(0, 0, 36, 20, 0, 0, 7); ctx.stroke();
    ctx.fillStyle = '#ddd5c4';
    ctx.beginPath(); ctx.arc(0, -3, 8, 0, 7); ctx.fill();
    ctx.fillRect(-5, 2, 10, 6);
    ctx.fillStyle = '#04121a';
    ctx.beginPath(); ctx.arc(-3, -4, 2.4, 0, 7); ctx.arc(3, -4, 2.4, 0, 7); ctx.fill();
  } else if (o.type === 'coin') {
    ctx.fillStyle = '#ffd23f';
    ctx.beginPath(); ctx.arc(0, 0, 12, 0, 7); ctx.fill();
    ctx.strokeStyle = '#b8860b'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(0, 0, 8, 0, 7); ctx.stroke();
  } else if (o.type === 'gem') {
    ctx.fillStyle = '#ff5ad0';
    ctx.beginPath(); ctx.moveTo(0, -16); ctx.lineTo(13, -4); ctx.lineTo(0, 16); ctx.lineTo(-13, -4); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath(); ctx.moveTo(0, -13); ctx.lineTo(8, -5); ctx.lineTo(0, -2); ctx.lineTo(-8, -5); ctx.closePath(); ctx.fill();
  } else if (o.type === 'shield') {
    ctx.strokeStyle = '#7fe9ff'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(0, 0, 15, 0, 7); ctx.stroke();
    ctx.fillStyle = 'rgba(127,233,255,0.35)';
    ctx.beginPath(); ctx.arc(0, 0, 15, 0, 7); ctx.fill();
  } else if (o.type === 'boost') {
    ctx.fillStyle = '#5aff7a';
    ctx.beginPath(); ctx.moveTo(0, 16); ctx.lineTo(12, -2); ctx.lineTo(5, -2); ctx.lineTo(5, -16);
    ctx.lineTo(-5, -16); ctx.lineTo(-5, -2); ctx.lineTo(-12, -2); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function drawRider(r, x, y, tumble = 0) {
  if (r.nudgeT > 0) x += Math.sin(r.nudgeT / 0.18 * Math.PI) * 14 * r.nudgeDir;
  ctx.save(); ctx.translate(x, y);
  if (tumble) ctx.rotate(tumble);
  const blink = r.stunT > 0 && Math.floor(performance.now() / 110) % 2;
  if (blink) ctx.globalAlpha = 0.25;
  ctx.fillStyle = '#a8763e';
  ctx.beginPath(); ctx.ellipse(0, 14, 22, 10, 0, 0, 7); ctx.fill();
  ctx.fillStyle = r.shirt;
  ctx.beginPath(); ctx.ellipse(0, -2, 11, 12, 0, 0, 7); ctx.fill();
  ctx.strokeStyle = r.shirt; ctx.lineWidth = 5; ctx.lineCap = 'round';
  if (r.boostT > 0) { ctx.beginPath(); ctx.moveTo(-8, -6); ctx.lineTo(-16, -20); ctx.moveTo(8, -6); ctx.lineTo(16, -20); ctx.stroke(); }
  else { ctx.beginPath(); ctx.moveTo(-8, -4); ctx.lineTo(-15, 8); ctx.moveTo(8, -4); ctx.lineTo(15, 8); ctx.stroke(); }
  ctx.fillStyle = '#e8b88a';
  ctx.beginPath(); ctx.arc(0, -18, 8, 0, 7); ctx.fill();
  ctx.fillStyle = r.bandana;
  ctx.beginPath(); ctx.arc(0, -21, 8, Math.PI, 0); ctx.fill();
  ctx.fillRect(-8, -22, 16, 4);
  ctx.globalAlpha = 1;
  if (r.stunT > 0) {
    ctx.fillStyle = '#ffe08a'; ctx.font = '13px system-ui, sans-serif'; ctx.textAlign = 'center';
    const a = performance.now() * 0.008;
    for (let k = 0; k < 3; k++) ctx.fillText('✦', Math.cos(a + k * 2.1) * 20, -28 + Math.sin(a + k * 2.1) * 6);
  }
  if (r.shield) {
    ctx.strokeStyle = 'rgba(127,233,255,0.9)'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0, -2, 28, 0, 7); ctx.stroke();
    ctx.fillStyle = 'rgba(127,233,255,0.12)';
    ctx.beginPath(); ctx.arc(0, -2, 28, 0, 7); ctx.fill();
  }
  if (r.boostT > 0) {
    ctx.fillStyle = 'rgba(90,255,122,0.7)';
    ctx.beginPath(); ctx.ellipse(0, 26, 11, 8 + Math.random() * 5, 0, 0, 7); ctx.fill();
  }
  ctx.fillStyle = r.cpu ? 'rgba(255,255,255,0.75)' : '#ffd23f';
  ctx.font = 'bold 10px system-ui, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(r.name, 0, 34);
  ctx.restore();
}

function ship(x, y, s) {
  ctx.save(); ctx.translate(x, y); ctx.scale(s, s);
  ctx.fillStyle = '#3a2410';
  ctx.beginPath();
  ctx.moveTo(-80, 0); ctx.quadraticCurveTo(-70, 34, -40, 38); ctx.lineTo(46, 38);
  ctx.quadraticCurveTo(84, 30, 92, -8); ctx.lineTo(70, -4); ctx.lineTo(70, 6); ctx.lineTo(-70, 6); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#4a2f14'; ctx.fillRect(46, -26, 34, 30);
  ctx.fillStyle = '#ffd76a';
  ctx.fillRect(54, -20, 7, 7); ctx.fillRect(66, -20, 7, 7);
  ctx.fillStyle = '#2c1c0c';
  ctx.fillRect(-38, -110, 5, 112); ctx.fillRect(10, -128, 5, 130);
  ctx.fillStyle = '#d8cdb4';
  ctx.beginPath(); ctx.moveTo(-36, -104); ctx.quadraticCurveTo(-6, -84, -36, -54); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(13, -122); ctx.quadraticCurveTo(48, -96, 13, -60); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(12, -122); ctx.quadraticCurveTo(-20, -96, 12, -62); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(15, -140, 22, 12);
  ctx.restore();
}

const ORD = ['1st', '2nd', '3rd'];
function hud() {
  const p = player();
  const rk = p.finished ? p.place : rank(p);
  ctx.textAlign = 'left';
  ctx.font = 'bold 30px system-ui, sans-serif';
  ctx.fillStyle = rk === 1 ? '#ffd23f' : rk === 2 ? '#cfd8dc' : '#c96a1e';
  ctx.fillText(ORD[rk - 1], 16, 40);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ffd23f';
  ctx.font = 'bold 22px system-ui, sans-serif';
  ctx.fillText(p.score, W - 18, 32);
  ctx.font = '12px system-ui, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillText(elapsed.toFixed(1) + 's', W - 18, 50);
  const ry0 = 80, ry1 = H - 90;
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(W - 10, ry0); ctx.lineTo(W - 10, ry1); ctx.stroke();
  for (const r of [...riders].reverse()) {
    ctx.fillStyle = r.cpu ? r.shirt : '#ffd23f';
    const pr = Math.min(1, r.dist / TRACK_LEN);
    ctx.beginPath(); ctx.arc(W - 10, ry0 + (ry1 - ry0) * pr, r.cpu ? 4 : 6, 0, 7); ctx.fill();
  }
  ctx.textAlign = 'center';
  ctx.font = '13px system-ui, sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('🏴‍☠️', W - 10, ry1 + 20);
  if (p.boostT > 0) {
    ctx.fillStyle = '#5aff7a'; ctx.font = 'bold 15px system-ui, sans-serif';
    ctx.fillText("BOOST — RAM 'EM!", W / 2, 66);
  } else if (inFork(p)) {
    ctx.fillStyle = 'rgba(255,210,63,0.85)'; ctx.font = 'bold 13px system-ui, sans-serif';
    ctx.fillText('🔒 IN THE CHUTE', W / 2, 66);
  }
  riders.forEach((r, i) => {
    if (!r.cpu) return;
    const ry = riderY(r);
    if (ry < -30 || ry > H + 30) {
      const edge = ry < -30 ? 24 : H - 14;
      ctx.fillStyle = r.shirt;
      ctx.font = 'bold 13px system-ui, sans-serif';
      const gap = Math.abs(Math.round((r.dist - p.dist) / 50));
      ctx.fillText((ry < -30 ? '▲ ' : '▼ ') + r.name + ' ' + gap + 'm', W * (i === 1 ? 0.38 : 0.68), edge);
    }
  });
}

function poolScene() {
  ctx.fillStyle = '#0a1622'; ctx.fillRect(0, 0, W, H);
  const g = ctx.createLinearGradient(0, 0, 0, H * 0.7);
  g.addColorStop(0, 'rgba(255,235,170,0.18)'); g.addColorStop(1, 'rgba(255,235,170,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.moveTo(W * 0.3, 0); ctx.lineTo(W * 0.7, 0); ctx.lineTo(W * 0.85, H * 0.7); ctx.lineTo(W * 0.15, H * 0.7); ctx.fill();
  ctx.fillStyle = '#0e4a63'; ctx.fillRect(0, H * 0.62, W, H);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  for (let i = 0; i < 6; i++) {
    ctx.beginPath();
    const y = H * 0.64 + i * 22;
    for (let x = 0; x <= W; x += 20) ctx.lineTo(x, y + Math.sin(x * 0.05 + performance.now() * 0.002 + i) * 3);
    ctx.stroke();
  }
  ship(W * 0.68, H * 0.62, 1.1);
  ctx.fillStyle = '#4a3418'; ctx.fillRect(-10, 0, 120, 46);
  ctx.fillStyle = '#1487a0'; ctx.fillRect(-10, 8, 116, 26);
  let bobI = 0;
  for (const r of riders) {
    if (!r.cpu) continue;
    if (r.finished && (!player().place || r.place < player().place)) {
      const bx = W * (0.20 + bobI * 0.13), by = H * 0.68 + Math.sin(performance.now() * 0.003 + bobI * 2) * 4;
      drawRider(r, bx, by); bobI++;
    }
  }
  const t = Math.min(1, splashT / 0.9);
  if (t < 1) {
    const ax = 90 + (W * 0.42 - 90) * t;
    const ay = 30 + (H * 0.62 - 30) * (t * t) - Math.sin(t * Math.PI) * 60;
    drawRider(player(), ax, ay, t * 5);
  } else {
    drawRider(player(), W * 0.42, H * 0.68 + Math.sin(performance.now() * 0.003) * 4);
  }
}

function centerPanel(lines, cy = H / 2) {
  ctx.fillStyle = 'rgba(6,10,14,0.78)';
  const ph = 46 + lines.length * 34;
  ctx.fillRect(30, cy - ph / 2, W - 60, ph);
  ctx.strokeStyle = '#ffd23f'; ctx.lineWidth = 2;
  ctx.strokeRect(30, cy - ph / 2, W - 60, ph);
  ctx.textAlign = 'center';
  lines.forEach((L, i) => {
    ctx.font = L.font || '18px system-ui, sans-serif';
    ctx.fillStyle = L.col || '#fff';
    ctx.fillText(L.t, W / 2, cy - ph / 2 + 44 + i * 34);
  });
}

function render() {
  if (state === 'splash' || state === 'over') {
    poolScene();
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life * 2); ctx.fillStyle = p.col;
      ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;
    if (state === 'over') {
      const p = player();
      const medal = ['🥇', '🥈', '🥉'][p.place - 1];
      const lines = [
        { t: medal + ' ' + ORD[p.place - 1].toUpperCase() + ' TO THE LAGOON ' + medal, font: 'bold 19px system-ui, sans-serif', col: p.place === 1 ? '#ffd23f' : '#cfd8dc' },
      ];
      for (const r of finishOrder)
        lines.push({ t: ORD[r.place - 1] + '  ' + r.name + '  —  ' + r.score, col: r.cpu ? r.shirt : '#ffd23f', font: r.cpu ? '16px system-ui, sans-serif' : 'bold 17px system-ui, sans-serif' });
      lines.push({ t: p.coins + ' doubloons · ' + p.kos + ' KOs · Best ' + best, col: '#7fe9ff', font: '15px system-ui, sans-serif' });
      lines.push({ t: overT > 0.6 ? 'TAP TO RACE AGAIN' : '', col: '#aaa', font: '15px system-ui, sans-serif' });
      centerPanel(lines, H * 0.30);
    }
    return;
  }

  const pd = state === 'title' ? 0 : player().dist;
  cave(pd);
  slide(pd);

  if (state !== 'title') {
    const py = PLAYER_Y();
    for (const o of objects) {
      if (!o.alive && !o.hazard) continue;
      const oy = py + (o.d - pd);
      if (oy > -60 && oy < H + 60) drawObject(o, oy);
    }
    for (const r of [...riders].reverse()) {
      const ry = riderY(r);
      if (ry > -50 && ry < H + 50) drawRider(r, r.px, ry);
    }
  }

  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life * 2); ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, 7); ctx.fill();
  }
  ctx.globalAlpha = 1;

  if (state === 'run') hud();

  if (state === 'count') {
    const n = countT < 0.5 ? '3' : countT < 1.0 ? '2' : countT < 1.5 ? '1' : 'GO!';
    ctx.textAlign = 'center';
    ctx.font = 'bold 72px system-ui, sans-serif';
    ctx.fillStyle = '#ffd23f';
    ctx.fillText(n, W / 2, H * 0.45);
    ctx.font = 'bold 16px system-ui, sans-serif';
    ctx.fillStyle = '#5aff7a';
    ctx.fillText('tap L / R — pick your chute!', W / 2, H * 0.45 + 40);
  }

  if (state === 'title') {
    drawRider({ name: 'YOU', shirt: '#2fa7a0', bandana: '#d23b2e', cpu: false, stunT: 0, boostT: 0, shield: false, nudgeT: 0 }, W / 2, PLAYER_Y());
    centerPanel([
      { t: '🏴‍☠️ PIRATE PLUNGE 🏴‍☠️', font: 'bold 24px system-ui, sans-serif', col: '#ffd23f' },
      { t: 'Race 2 rival riders to the lagoon.' },
      { t: 'Thumb-tap LEFT / RIGHT to slide over.', col: '#5aff7a' },
      { t: 'Taps stack — hammer to carve across.', col: '#5aff7a' },
      { t: 'Pick your chute at the drop-in!', col: '#ffd23f' },
      { t: 'Grab BOOST and ram your rivals.', col: '#7fe9ff' },
      { t: 'Best ' + best, col: '#ff8a80' },
      { t: 'TAP TO DROP IN', font: 'bold 18px system-ui, sans-serif', col: '#5aff7a' },
    ]);
  }
}

// ---------- main loop ----------
let last = performance.now();
function frame(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  update(dt);
  render();
  requestAnimationFrame(frame);
}
reset();
state = 'title';
requestAnimationFrame(frame);
</script>
</body>
</html>
