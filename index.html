<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Pirate Plunge — vibe prototype</title>
<style>
  html, body { margin:0; padding:0; height:100%; background:#0b0806; overflow:hidden; touch-action:none;
               -webkit-user-select:none; user-select:none; }
  canvas { display:block; margin:0 auto; height:100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
// ============================================================
// PIRATE PLUNGE — 30-second cave water-slide lane runner
// Goonies-inspired vibe prototype. One file, no assets.
// Tap left / middle / right to pick your channel down the chute.
// ============================================================

const cv = document.getElementById('c');
const ctx = cv.getContext('2d');

// Logical coordinate space: width fixed, height follows device aspect.
const W = 420;
let H = 740;

function fit() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const aw = window.innerWidth, ah = window.innerHeight;
  H = Math.max(620, Math.min(980, Math.round(W * ah / aw)));
  cv.width = W * dpr; cv.height = H * dpr;
  cv.style.width = aw + 'px'; cv.style.height = ah + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', fit);
fit();

// ---------- tuning ----------
const SLIDE_W   = 330;                 // total chute width
const LANE_W    = SLIDE_W / 3;
const SLIDE_X   = (W - SLIDE_W) / 2;   // left edge of chute
const PLAYER_Y  = () => H * 0.30;      // player sits near top; track scrolls up past them
const BASE_SPD  = 520;                 // px/s at start
const MAX_SPD   = 800;                 // px/s near the bottom
const TRACK_LEN = 18500;               // ~30s at avg speed
const HIT_SLOW  = 0.55;                // speed multiplier right after a hit
const BOOST_MUL = 1.5;
const BOOST_DUR = 2.0;
const INVULN    = 1.1;                 // s of mercy after a hit

const laneX = l => SLIDE_X + LANE_W * (l + 0.5);

// ---------- audio (all synth, no files) ----------
let AC = null, whoosh = null, whooshGain = null;
function audioInit() {
  if (AC) return;
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    // looping filtered noise = water rush, gain tied to speed
    const len = AC.sampleRate * 1.5;
    const buf = AC.createBuffer(1, len, AC.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    whoosh = AC.createBufferSource(); whoosh.buffer = buf; whoosh.loop = true;
    const f = AC.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 700; f.Q.value = 0.6;
    whooshGain = AC.createGain(); whooshGain.gain.value = 0;
    whoosh.connect(f); f.connect(whooshGain); whooshGain.connect(AC.destination);
    whoosh.start();
  } catch (e) { AC = null; }
}
function beep(freq, dur, type = 'square', vol = 0.14, slideTo = 0) {
  if (!AC) return;
  const o = AC.createOscillator(), g = AC.createGain(), t = AC.currentTime;
  o.type = type; o.frequency.setValueAtTime(freq, t);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(AC.destination); o.start(t); o.stop(t + dur + 0.02);
}
function noiseBurst(dur, vol = 0.3, freq = 900) {
  if (!AC) return;
  const len = AC.sampleRate * dur, buf = AC.createBuffer(1, len, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const s = AC.createBufferSource(); s.buffer = buf;
  const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = freq;
  const g = AC.createGain(); g.gain.value = vol;
  s.connect(f); f.connect(g); g.connect(AC.destination); s.start();
}
const sfx = {
  coin:   () => beep(880, 0.09, 'square', 0.10, 1320),
  gem:    () => { beep(660, 0.10, 'square', 0.10); setTimeout(() => beep(880, 0.10, 'square', 0.10), 70); setTimeout(() => beep(1320, 0.16, 'square', 0.10), 140); },
  shield: () => beep(520, 0.25, 'triangle', 0.16, 780),
  boost:  () => beep(220, 0.45, 'sawtooth', 0.14, 880),
  hit:    () => { beep(140, 0.25, 'sawtooth', 0.22, 60); noiseBurst(0.18, 0.25, 600); },
  splash: () => { noiseBurst(0.8, 0.4, 700); beep(300, 0.5, 'sine', 0.12, 80); },
  lane:   () => noiseBurst(0.06, 0.08, 1400),
};

// ---------- game state ----------
let state = 'title';          // title | run | splash | over
let dist, speed, elapsed, lane, px, hearts, score, coins;
let shield, boostT, invulnT, hitSlowT, splashT, overT, wipeout;
let objects, particles, best = +(localStorage.getItem('pp_best') || 0);

function buildTrack() {
  // Spawn table over track distance. Every hazard row keeps >=1 safe lane.
  const objs = [];
  let d = 900;
  let special = 0;
  while (d < TRACK_LEN - 900) {
    const t = d / TRACK_LEN;                          // difficulty ramp 0..1
    const nHaz = Math.random() < 0.15 + t * 0.5 ? 2 : 1;
    const lanes = [0, 1, 2].sort(() => Math.random() - 0.5);
    const hazTypes = ['rock', 'spikes', 'hole'];
    for (let i = 0; i < nHaz; i++) {
      objs.push({ d, lane: lanes[i], type: hazTypes[(Math.random() * 3) | 0], hazard: true, alive: true });
    }
    const safe = lanes[nHaz];                          // guaranteed safe lane
    // coin string in the safe lane, most rows
    if (Math.random() < 0.65) {
      for (let k = 0; k < 3; k++) objs.push({ d: d + 70 + k * 55, lane: safe, type: 'coin', alive: true });
    }
    // sprinkle a special every ~1600px
    special += 300 + Math.random() * 90;
    if (special > 1600) {
      special = 0;
      const kind = ['gem', 'shield', 'boost', 'gem'][(Math.random() * 4) | 0];
      objs.push({ d: d + 160, lane: (Math.random() * 3) | 0, type: kind, alive: true });
    }
    d += 320 + Math.random() * 140 - t * 60;           // rows tighten as you descend
  }
  return objs;
}

function reset() {
  dist = 0; speed = BASE_SPD; elapsed = 0;
  lane = 1; px = laneX(1);
  hearts = 3; score = 0; coins = 0;
  shield = false; boostT = 0; invulnT = 0; hitSlowT = 0; splashT = 0; overT = 0; wipeout = false;
  objects = buildTrack();
  particles = [];
}

// ---------- input ----------
function pickLane(clientX) {
  const rect = cv.getBoundingClientRect();
  const x = (clientX - rect.left) / rect.width * W;
  return x < W / 3 ? 0 : x < 2 * W / 3 ? 1 : 2;
}
function press(clientX) {
  audioInit();
  if (AC && AC.state === 'suspended') AC.resume();
  if (state === 'title') { reset(); state = 'run'; return; }
  if (state === 'over' && overT > 0.6) { reset(); state = 'run'; return; }
  if (state === 'run') {
    const l = pickLane(clientX);
    if (l !== lane) { lane = l; sfx.lane(); }
  }
}
cv.addEventListener('pointerdown', e => { e.preventDefault(); press(e.clientX); });
window.addEventListener('keydown', e => {
  if (state !== 'run') { if (e.key === ' ' || e.key === 'Enter') press(W / 2); return; }
  audioInit();
  if (e.key === 'ArrowLeft'  && lane > 0) { lane--; sfx.lane(); }
  if (e.key === 'ArrowRight' && lane < 2) { lane++; sfx.lane(); }
  if (e.key === '1') lane = 0; if (e.key === '2') lane = 1; if (e.key === '3') lane = 2;
});

// ---------- particles ----------
function spray(x, y, n, col, spread = 3, up = -2) {
  for (let i = 0; i < n; i++) {
    particles.push({ x, y, vx: (Math.random() - 0.5) * spread * 60,
                     vy: (up + Math.random() * 2) * 60, life: 0.4 + Math.random() * 0.4, col });
  }
}

// ---------- update ----------
function update(dt) {
  if (state === 'run') {
    elapsed += dt;
    const ramp = BASE_SPD + (MAX_SPD - BASE_SPD) * Math.min(1, dist / TRACK_LEN);
    let mul = 1;
    if (boostT > 0)   { boostT -= dt; mul *= BOOST_MUL; }
    if (hitSlowT > 0) { hitSlowT -= dt; mul *= HIT_SLOW; }
    if (invulnT > 0)  invulnT -= dt;
    speed = ramp * mul;
    dist += speed * dt;

    // steer toward chosen lane
    const tx = laneX(lane);
    px += (tx - px) * Math.min(1, dt * 18);

    // water spray behind the sack
    if (Math.random() < 0.6) spray(px + (Math.random() - 0.5) * 26, PLAYER_Y() + 18, 1, 'rgba(210,240,255,0.8)', 2, -1.2);

    // collisions & pickups
    const py = PLAYER_Y();
    for (const o of objects) {
      if (!o.alive) continue;
      const oy = py + (o.d - dist);                    // object screen y
      if (oy < -80 || oy > H + 80) continue;
      // asymmetric hitboxes: hazards forgiving (esp. mid-dodge), pickups generous
      const hx = o.hazard ? 38 : 58, hy = o.hazard ? 36 : 48;
      if (Math.abs(laneX(o.lane) - px) < hx && Math.abs(oy - py) < hy) {
        if (o.hazard) {
          if (boostT > 0) {                            // boost smashes through
            o.alive = false; score += 5; spray(px, py, 12, '#ffd23f', 5, -3); sfx.coin();
          } else if (invulnT <= 0) {
            o.alive = false;
            if (shield) { shield = false; sfx.shield(); spray(px, py, 14, '#7fe9ff', 5, -3); invulnT = 0.6; }
            else {
              hearts--; invulnT = INVULN; hitSlowT = 0.8; sfx.hit();
              spray(px, py, 18, '#ff5a4e', 6, -3);
              if (hearts <= 0) { wipeout = true; state = 'over'; overT = 0; sfx.splash(); }
            }
          }
        } else {
          o.alive = false;
          const dbl = boostT > 0 ? 2 : 1;
          if (o.type === 'coin')   { coins++; score += 10 * dbl; sfx.coin();  spray(px, py - 10, 6, '#ffd23f', 3, -2.5); }
          if (o.type === 'gem')    { score += 50 * dbl;          sfx.gem();   spray(px, py - 10, 12, '#ff5ad0', 4, -3); }
          if (o.type === 'shield') { shield = true;              sfx.shield(); }
          if (o.type === 'boost')  { boostT = BOOST_DUR;         sfx.boost(); }
        }
      }
    }

    if (dist >= TRACK_LEN) { state = 'splash'; splashT = 0; sfx.splash(); }
  }
  else if (state === 'splash') {
    splashT += dt;
    if (splashT < 0.05) for (let i = 0; i < 40; i++) spray(W / 2, H * 0.62, 1, 'rgba(190,230,255,0.9)', 9, -5);
    if (splashT > 1.4) {
      score += hearts * 25;                            // heart bonus
      if (score > best) { best = score; localStorage.setItem('pp_best', best); }
      state = 'over'; overT = 0;
    }
  }
  else if (state === 'over') {
    overT += dt;
    if (wipeout && overT === dt && score > best) { best = score; localStorage.setItem('pp_best', best); }
  }

  // particles
  for (const p of particles) { p.life -= dt; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 300 * dt; }
  particles = particles.filter(p => p.life > 0);

  if (whooshGain) whooshGain.gain.value = state === 'run' ? 0.05 + 0.10 * (speed / MAX_SPD) : 0.015;
}

// ---------- drawing helpers ----------
function cave() {
  // background rock
  ctx.fillStyle = '#161009';
  ctx.fillRect(0, 0, W, H);
  // jagged walls, parallax with distance
  const off = (dist * 0.9) % 90;
  ctx.fillStyle = '#241709';
  for (const side of [0, 1]) {
    ctx.beginPath();
    ctx.moveTo(side ? W : 0, 0);
    for (let y = -90; y <= H + 90; y += 45) {
      const j = 18 + 14 * Math.sin((y + off) * 0.09 + side * 5) + 8 * Math.sin((y + off) * 0.23);
      ctx.lineTo(side ? W - SLIDE_X + 14 - j : SLIDE_X - 14 + j, y - off + 45);
    }
    ctx.lineTo(side ? W : 0, H);
    ctx.closePath(); ctx.fill();
  }
  // torches
  const toff = dist % 620;
  for (let y = -toff; y < H + 80; y += 620) {
    for (const tx of [SLIDE_X - 26, W - SLIDE_X + 26]) {
      const fl = 3 + Math.sin(performance.now() * 0.02 + tx) * 2;
      ctx.fillStyle = '#5a3a16'; ctx.fillRect(tx - 3, y + 8, 6, 18);
      ctx.fillStyle = '#ff9a2a';
      ctx.beginPath(); ctx.ellipse(tx, y + 2, 6, 9 + fl, 0, 0, 7); ctx.fill();
      ctx.fillStyle = '#ffe08a';
      ctx.beginPath(); ctx.ellipse(tx, y + 4, 3, 5, 0, 0, 7); ctx.fill();
      // glow
      const g = ctx.createRadialGradient(tx, y, 4, tx, y, 70);
      g.addColorStop(0, 'rgba(255,160,60,0.16)'); g.addColorStop(1, 'rgba(255,160,60,0)');
      ctx.fillStyle = g; ctx.fillRect(tx - 70, y - 70, 140, 140);
    }
  }
}

function chute() {
  // stone rim
  ctx.fillStyle = '#4a3418';
  ctx.fillRect(SLIDE_X - 14, 0, SLIDE_W + 28, H);
  // water
  const g = ctx.createLinearGradient(SLIDE_X, 0, SLIDE_X + SLIDE_W, 0);
  g.addColorStop(0, '#0e5d70'); g.addColorStop(0.5, '#1487a0'); g.addColorStop(1, '#0e5d70');
  ctx.fillStyle = g;
  ctx.fillRect(SLIDE_X, 0, SLIDE_W, H);
  // lane divider ripples
  ctx.strokeStyle = 'rgba(255,255,255,0.10)';
  ctx.lineWidth = 2;
  for (let i = 1; i < 3; i++) {
    const x = SLIDE_X + LANE_W * i;
    ctx.beginPath();
    for (let y = 0; y <= H; y += 12)
      ctx.lineTo(x + Math.sin((y + dist) * 0.05) * 3, y);
    ctx.stroke();
  }
  // rushing streaks
  ctx.strokeStyle = 'rgba(255,255,255,0.22)';
  const soff = dist % 140;
  for (let y = -soff; y < H; y += 140) {
    for (let i = 0; i < 5; i++) {
      const x = SLIDE_X + 20 + ((i * 73 + y * 1.7) % (SLIDE_W - 40));
      ctx.beginPath(); ctx.moveTo(x, y + i * 22); ctx.lineTo(x - 3, y + i * 22 + 26 + speed * 0.02); ctx.stroke();
    }
  }
  // foam edges
  ctx.fillStyle = 'rgba(255,255,255,0.30)';
  const foff = dist % 26;
  for (let y = -foff; y < H; y += 26) {
    ctx.fillRect(SLIDE_X, y, 5, 12);
    ctx.fillRect(SLIDE_X + SLIDE_W - 5, y + 8, 5, 12);
  }
}

function drawObject(o, oy) {
  const x = laneX(o.lane);
  ctx.save(); ctx.translate(x, oy);
  if (o.type === 'rock') {
    ctx.fillStyle = '#6b6b66';
    ctx.beginPath();
    ctx.moveTo(-30, 14); ctx.lineTo(-22, -14); ctx.lineTo(-4, -24); ctx.lineTo(18, -16);
    ctx.lineTo(30, 6); ctx.lineTo(16, 18); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#84847e';
    ctx.beginPath(); ctx.moveTo(-14, -14); ctx.lineTo(-4, -22); ctx.lineTo(12, -14); ctx.lineTo(-2, -6); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillRect(-34, 12, 10, 5); ctx.fillRect(24, 8, 10, 5);   // water piling at base
  } else if (o.type === 'spikes') {
    for (let i = -1; i <= 1; i++) {
      ctx.fillStyle = '#7a4a1c';
      ctx.beginPath(); ctx.moveTo(i * 26 - 9, 16); ctx.lineTo(i * 26, -22); ctx.lineTo(i * 26 + 9, 16); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#e8d9b0';
      ctx.beginPath(); ctx.moveTo(i * 26 - 3, -12); ctx.lineTo(i * 26, -22); ctx.lineTo(i * 26 + 3, -12); ctx.closePath(); ctx.fill();
    }
  } else if (o.type === 'hole') {
    ctx.fillStyle = 'rgba(4,10,14,0.92)';
    ctx.beginPath(); ctx.ellipse(0, 0, 40, 22, 0, 0, 7); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.ellipse(0, 0, 40, 22, 0, 0, 7); ctx.stroke();
    // little skull
    ctx.fillStyle = '#ddd5c4';
    ctx.beginPath(); ctx.arc(0, -3, 8, 0, 7); ctx.fill();
    ctx.fillRect(-5, 2, 10, 6);
    ctx.fillStyle = '#04121a';
    ctx.beginPath(); ctx.arc(-3, -4, 2.4, 0, 7); ctx.arc(3, -4, 2.4, 0, 7); ctx.fill();
  } else if (o.type === 'coin') {
    ctx.fillStyle = '#ffd23f';
    ctx.beginPath(); ctx.arc(0, 0, 12, 0, 7); ctx.fill();
    ctx.strokeStyle = '#b8860b'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(0, 0, 8, 0, 7); ctx.stroke();
  } else if (o.type === 'gem') {
    ctx.fillStyle = '#ff5ad0';
    ctx.beginPath(); ctx.moveTo(0, -16); ctx.lineTo(13, -4); ctx.lineTo(0, 16); ctx.lineTo(-13, -4); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath(); ctx.moveTo(0, -13); ctx.lineTo(8, -5); ctx.lineTo(0, -2); ctx.lineTo(-8, -5); ctx.closePath(); ctx.fill();
  } else if (o.type === 'shield') {
    ctx.strokeStyle = '#7fe9ff'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(0, 0, 15, 0, 7); ctx.stroke();
    ctx.fillStyle = 'rgba(127,233,255,0.35)';
    ctx.beginPath(); ctx.arc(0, 0, 15, 0, 7); ctx.fill();
  } else if (o.type === 'boost') {
    ctx.fillStyle = '#5aff7a';
    ctx.beginPath(); ctx.moveTo(0, 16); ctx.lineTo(12, -2); ctx.lineTo(5, -2); ctx.lineTo(5, -16);
    ctx.lineTo(-5, -16); ctx.lineTo(-5, -2); ctx.lineTo(-12, -2); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function drawPlayer(x, y, tumble = 0) {
  ctx.save(); ctx.translate(x, y);
  if (tumble) ctx.rotate(tumble);
  if (invulnT > 0 && state === 'run' && Math.floor(performance.now() / 90) % 2) ctx.globalAlpha = 0.4;
  // burlap sack
  ctx.fillStyle = '#a8763e';
  ctx.beginPath(); ctx.ellipse(0, 14, 24, 11, 0, 0, 7); ctx.fill();
  ctx.strokeStyle = '#7c5527'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-14, 10); ctx.lineTo(14, 16); ctx.stroke();
  // body
  ctx.fillStyle = '#2fa7a0';
  ctx.beginPath(); ctx.ellipse(0, -2, 12, 13, 0, 0, 7); ctx.fill();
  // arms (up when boosting)
  ctx.strokeStyle = '#2fa7a0'; ctx.lineWidth = 5; ctx.lineCap = 'round';
  if (boostT > 0 && state === 'run') {
    ctx.beginPath(); ctx.moveTo(-9, -6); ctx.lineTo(-18, -22); ctx.moveTo(9, -6); ctx.lineTo(18, -22); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(-9, -4); ctx.lineTo(-17, 8); ctx.moveTo(9, -4); ctx.lineTo(17, 8); ctx.stroke();
  }
  // head + red bandana
  ctx.fillStyle = '#e8b88a';
  ctx.beginPath(); ctx.arc(0, -19, 9, 0, 7); ctx.fill();
  ctx.fillStyle = '#d23b2e';
  ctx.beginPath(); ctx.arc(0, -22, 9, Math.PI, 0); ctx.fill();
  ctx.fillRect(-9, -23, 18, 4);
  ctx.globalAlpha = 1;
  // shield bubble
  if (shield && state === 'run') {
    ctx.strokeStyle = 'rgba(127,233,255,0.9)'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0, -2, 32, 0, 7); ctx.stroke();
    ctx.fillStyle = 'rgba(127,233,255,0.12)';
    ctx.beginPath(); ctx.arc(0, -2, 32, 0, 7); ctx.fill();
  }
  // boost flames
  if (boostT > 0 && state === 'run') {
    ctx.fillStyle = 'rgba(90,255,122,0.7)';
    ctx.beginPath(); ctx.ellipse(0, 28, 12, 8 + Math.random() * 5, 0, 0, 7); ctx.fill();
  }
  ctx.restore();
}

function ship(x, y, s) {
  ctx.save(); ctx.translate(x, y); ctx.scale(s, s);
  // hull
  ctx.fillStyle = '#3a2410';
  ctx.beginPath();
  ctx.moveTo(-80, 0); ctx.quadraticCurveTo(-70, 34, -40, 38); ctx.lineTo(46, 38);
  ctx.quadraticCurveTo(84, 30, 92, -8); ctx.lineTo(70, -4); ctx.lineTo(70, 6); ctx.lineTo(-70, 6); ctx.closePath(); ctx.fill();
  // stern castle
  ctx.fillStyle = '#4a2f14'; ctx.fillRect(46, -26, 34, 30);
  ctx.fillStyle = '#ffd76a';
  ctx.fillRect(54, -20, 7, 7); ctx.fillRect(66, -20, 7, 7);   // lit windows
  // masts + sails
  ctx.fillStyle = '#2c1c0c';
  ctx.fillRect(-38, -110, 5, 112); ctx.fillRect(10, -128, 5, 130);
  ctx.fillStyle = '#d8cdb4';
  ctx.beginPath(); ctx.moveTo(-36, -104); ctx.quadraticCurveTo(-6, -84, -36, -54); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(13, -122); ctx.quadraticCurveTo(48, -96, 13, -60); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(12, -122); ctx.quadraticCurveTo(-20, -96, 12, -62); ctx.closePath(); ctx.fill();
  // flag
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(15, -140, 22, 12);
  ctx.restore();
}

function heartsHud() {
  for (let i = 0; i < 3; i++) {
    const x = 20 + i * 30, y = 24;
    ctx.fillStyle = i < hearts ? '#ff5a4e' : 'rgba(255,255,255,0.18)';
    ctx.beginPath();
    ctx.arc(x - 5, y - 3, 6, 0, 7); ctx.arc(x + 5, y - 3, 6, 0, 7);
    ctx.moveTo(x - 11, y); ctx.lineTo(x, y + 12); ctx.lineTo(x + 11, y); ctx.closePath(); ctx.fill();
  }
}

function hud() {
  heartsHud();
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ffd23f';
  ctx.font = 'bold 22px system-ui, sans-serif';
  ctx.fillText(score, W - 18, 32);
  ctx.font = '12px system-ui, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillText(elapsed.toFixed(1) + 's', W - 18, 50);
  // progress rail down the right edge
  const ry0 = 80, ry1 = H - 90;
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(W - 10, ry0); ctx.lineTo(W - 10, ry1); ctx.stroke();
  ctx.fillStyle = '#ffd23f';
  const p = Math.min(1, dist / TRACK_LEN);
  ctx.beginPath(); ctx.arc(W - 10, ry0 + (ry1 - ry0) * p, 5, 0, 7); ctx.fill();
  ctx.textAlign = 'center';
  ctx.font = '13px system-ui, sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('🏴‍☠️', W - 10, ry1 + 20);
  if (boostT > 0) {
    ctx.fillStyle = '#5aff7a'; ctx.font = 'bold 15px system-ui, sans-serif';
    ctx.fillText('BOOST!', W / 2, 66);
  }
}

function poolScene() {
  // cavern with lagoon + ship, player splashes in
  ctx.fillStyle = '#0a1622'; ctx.fillRect(0, 0, W, H);
  // light shaft
  const g = ctx.createLinearGradient(0, 0, 0, H * 0.7);
  g.addColorStop(0, 'rgba(255,235,170,0.18)'); g.addColorStop(1, 'rgba(255,235,170,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.moveTo(W * 0.3, 0); ctx.lineTo(W * 0.7, 0); ctx.lineTo(W * 0.85, H * 0.7); ctx.lineTo(W * 0.15, H * 0.7); ctx.fill();
  // water
  ctx.fillStyle = '#0e4a63'; ctx.fillRect(0, H * 0.62, W, H);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  for (let i = 0; i < 6; i++) {
    ctx.beginPath();
    const y = H * 0.64 + i * 22;
    for (let x = 0; x <= W; x += 20) ctx.lineTo(x, y + Math.sin(x * 0.05 + performance.now() * 0.002 + i) * 3);
    ctx.stroke();
  }
  ship(W * 0.68, H * 0.62, 1.1);
  // slide lip top-left
  ctx.fillStyle = '#4a3418'; ctx.fillRect(-10, 0, 120, 46);
  ctx.fillStyle = '#1487a0'; ctx.fillRect(-10, 8, 116, 26);
  // player arc
  const t = Math.min(1, splashT / 0.9);
  if (t < 1) {
    const ax = 90 + (W * 0.42 - 90) * t;
    const ay = 30 + (H * 0.62 - 30) * (t * t) - Math.sin(t * Math.PI) * 60;
    drawPlayer(ax, ay, t * 5);
  }
}

function centerPanel(lines, cy = H / 2) {
  ctx.fillStyle = 'rgba(6,10,14,0.78)';
  const ph = 46 + lines.length * 34;
  ctx.fillRect(30, cy - ph / 2, W - 60, ph);
  ctx.strokeStyle = '#ffd23f'; ctx.lineWidth = 2;
  ctx.strokeRect(30, cy - ph / 2, W - 60, ph);
  ctx.textAlign = 'center';
  lines.forEach((L, i) => {
    ctx.font = L.font || '18px system-ui, sans-serif';
    ctx.fillStyle = L.col || '#fff';
    ctx.fillText(L.t, W / 2, cy - ph / 2 + 44 + i * 34);
  });
}

// ---------- render ----------
function render() {
  if (state === 'splash' || (state === 'over' && !wipeout)) {
    poolScene();
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life * 2); ctx.fillStyle = p.col;
      ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;
    if (state === 'over') {
      centerPanel([
        { t: '⚓ YOU MADE THE LAGOON! ⚓', font: 'bold 20px system-ui, sans-serif', col: '#ffd23f' },
        { t: 'Score ' + score + '   ·   ' + coins + ' doubloons' },
        { t: 'Heart bonus +' + hearts * 25, col: '#ff8a80' },
        { t: 'Best ' + best, col: '#7fe9ff' },
        { t: overT > 0.6 ? 'TAP TO SLIDE AGAIN' : '', col: '#aaa', font: '15px system-ui, sans-serif' },
      ], H * 0.30);
    }
    return;
  }

  cave();
  chute();

  const py = PLAYER_Y();
  if (state !== 'title') {
    for (const o of objects) {
      if (!o.alive) continue;
      const oy = py + (o.d - dist);
      if (oy > -60 && oy < H + 60) drawObject(o, oy);
    }
    drawPlayer(px, py);
  }

  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life * 2); ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, 7); ctx.fill();
  }
  ctx.globalAlpha = 1;

  if (state === 'run') hud();

  if (state === 'title') {
    drawPlayer(W / 2, py);
    centerPanel([
      { t: '🏴‍☠️ PIRATE PLUNGE 🏴‍☠️', font: 'bold 24px system-ui, sans-serif', col: '#ffd23f' },
      { t: '30 seconds down the chute.' },
      { t: 'Tap LEFT · MIDDLE · RIGHT to pick a path.' },
      { t: 'Dodge rocks, spikes & holes. Grab loot.', col: '#7fe9ff' },
      { t: 'Best ' + best, col: '#ff8a80' },
      { t: 'TAP TO DROP IN', font: 'bold 18px system-ui, sans-serif', col: '#5aff7a' },
    ]);
  }
  if (state === 'over' && wipeout) {
    centerPanel([
      { t: '💀 WIPED OUT 💀', font: 'bold 24px system-ui, sans-serif', col: '#ff5a4e' },
      { t: Math.round(dist / TRACK_LEN * 100) + '% of the way down' },
      { t: 'Score ' + score + '   ·   Best ' + best, col: '#ffd23f' },
      { t: overT > 0.6 ? 'TAP TO TRY AGAIN' : '', col: '#aaa', font: '15px system-ui, sans-serif' },
    ]);
  }
}

// ---------- main loop ----------
let last = performance.now();
function frame(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  update(dt);
  render();
  requestAnimationFrame(frame);
}
reset();
state = 'title';
requestAnimationFrame(frame);
</script>
</body>
</html>
